<!DOCTYPE html>
<html>
<head>
    <title>Creepers Corner</title>
  
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>


    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- TITLE --->

    <div class="title-contaner">
        <img src="images/11635.jpg" class="title-back">
    </div>

    <div class="title-box">
        <img src="images/clogo.jpg" class="title-logo">
        
        Creepers Corner

    </div>

    <!---- NAVIGATION --->

    <nav>

        <a href="index.html">HOME</a>

        <a href="shop.html">SHOP</a>

        <a href="community.html">COMMUNITY</a>

        <a href="about.html">ABOUT</a>

        <a href="contact.html">CONTACT</a>

    </nav>

    <!---- MAIN IMAGE -->

    <div>

        <img src="images/minecraft1.jpg" id="mainpic">

    </div>

    <!-- PLAY BUTTON ----->

    <div class="play-button">

        <a href="https://www.minecraft.net/" target="_blank">

            <button>
                <img src="images/Bee.gif" id="play-logo">

                PLAY NOW!
            </button>

        </a>

    </div>


<div class="box-container">

    <!--- LEFT BOX ---->

    <div class="info-box">

        <div id="biomeCarousel"
             class="carousel slide biome-carousel"
             data-ride="carousel">

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="images/300px-Meadow.png"
                         class="d-block w-100"
                         alt="Biome 1">
                </div>

                <div class="carousel-item">
                    <img src="images/300px-Cherry_Grove.png"
                         class="d-block w-100"
                         alt="Biome 2">
                </div>

                <div class="carousel-item">
                    <img src="images/300px-Jagged_Peaks.png"
                         class="d-block w-100"
                         alt="Biome 3">
                </div>

                <div class="carousel-item">
                    <img src="images/300px-Taiga.png"
                         class="d-block w-100"
                         alt="Biome 4">
                </div>

                <div class="carousel-item">
                    <img src="images/300px-The_End.png"
                         class="d-block w-100"
                         alt="Biome 5">
                </div>

            </div>

            <!--- BUTTONS -->

            <button class="carousel-control-prev"
                    type="button"
                    data-target="#biomeCarousel"
                    data-slide="prev">

                <span class="carousel-control-prev-icon"></span>

            </button>

            <button class="carousel-control-next"
                    type="button"
                    data-target="#biomeCarousel"
                    data-slide="next">

                <span class="carousel-control-next-icon"></span>

            </button>

        </div>

    </div>

    <!---- RIGHT BOX ----->

    <div class="info-box">

        <img src="images/diamond_sword.jpg" class="feaImg">

    </div>

</div>

    <footer>

        @minecraftisFUN!!!

    </footer>


    <script src="script.js"></script>


</body>

</html>
